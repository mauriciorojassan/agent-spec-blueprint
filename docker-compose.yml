version: '3.9'

services:
  app:
    build: .
    container_name: agentx-spec-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Cambia provider a ollama cuando lo soportes en tu LLMClient
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    depends_on:
      - ollama
    # Si no quieres depender de ollama todavía, puedes comentar depends_on y el servicio ollama.

  ollama:
    image: ollama/ollama:latest
    container_name: agentx-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
